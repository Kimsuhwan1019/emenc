<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h2>회원가입</h2>

    <!-- th:object/th:field 사용, CSRF 토큰은 시큐리티가 자동 삽입 -->
    <form th:action="@{/user/signup}" th:object="${userCreateForm}" method="post">
        <!-- 전역 오류(중복 가입 등): #fields는 th:object가 있는 form 안에서만 동작 -->
        <div class="form-errors" th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>
        <div class="form-row">
            <label for="username">사용자 ID</label>
            <input type="text" th:field="*{username}" id="username">
            <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>
        <div class="form-row">
            <label for="email">이메일</label>
            <input type="email" th:field="*{email}" id="email">
            <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="form-row">
            <label for="password1">비밀번호</label>
            <input type="password" th:field="*{password1}" id="password1">
            <div class="field-error" th:if="${#fields.hasErrors('password1')}" th:errors="*{password1}"></div>
        </div>
        <div class="form-row">
            <label for="password2">비밀번호 확인</label>
            <input type="password" th:field="*{password2}" id="password2">
            <div class="field-error" th:if="${#fields.hasErrors('password2')}" th:errors="*{password2}"></div>
        </div>
        <button type="submit">회원가입</button>
    </form>
</div>
</body>
</html>
