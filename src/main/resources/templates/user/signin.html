<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">
    <h2>로그인</h2>

    <!-- 로그인 실패 시 시큐리티가 ?error 파라미터로 리다이렉트 -->
    <div class="form-errors" th:if="${param.error}">
        <p>사용자 ID 또는 비밀번호가 올바르지 않습니다.</p>
    </div>
    <!-- 로그아웃 완료 안내 -->
    <div class="form-info" th:if="${param.logout}">
        <p>로그아웃 되었습니다.</p>
    </div>

    <!-- 인증 처리 URL은 시큐리티 설정과 동일한 /user/signin, CSRF 자동 삽입 -->
    <form th:action="@{/user/signin}" method="post">
        <div class="form-row">
            <label for="username">사용자 ID</label>
            <input type="text" name="username" id="username">
        </div>
        <div class="form-row">
            <label for="password">비밀번호</label>
            <input type="password" name="password" id="password">
        </div>
        <button type="submit">로그인</button>
    </form>
</div>
</body>
</html>
